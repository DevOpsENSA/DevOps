<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Auth</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
}

.container {
    width: 320px;
    margin: 80px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
}

button {
    width: 100%;
    padding: 10px;
    background: #007bff;
    color: white;
    border: none;
    cursor: pointer;
}

.toggle {
    margin-top: 10px;
    color: blue;
    cursor: pointer;
}

.hidden {
    display: none;
}
</style>

</head>

<body>

<div class="container">

    <!-- LOGIN -->
    <div id="loginForm">
        <h2>Connexion</h2>
        <form onsubmit="login(event)">
            <input type="text" id="loginEmail" placeholder="Email" required>
            <input type="password" id="loginPassword" placeholder="Mot de passe" required>
            <button type="submit">Se connecter</button>
        </form>

        <p class="toggle" onclick="showRegister()">Créer un compte</p>
    </div>

    <!-- REGISTER -->
    <div id="registerForm" class="hidden">
        <h2>Inscription</h2>
        <form onsubmit="register(event)">
            <input type="text" id="regName" placeholder="Nom" required>
            <input type="text" id="regEmail" placeholder="Email" required>
            <input type="password" id="regPassword" placeholder="Mot de passe" required>
            <button type="submit">S'inscrire</button>
        </form>

        <p class="toggle" onclick="showLogin()">Déjà un compte ? Se connecter</p>
    </div>

</div>

<script>
const API_BASE = `${window.location.protocol}//${window.location.hostname}:8080/api`;

// afficher register
function showRegister() {
    document.getElementById("loginForm").classList.add("hidden");
    document.getElementById("registerForm").classList.remove("hidden");
}

// afficher login
function showLogin() {
    document.getElementById("registerForm").classList.add("hidden");
    document.getElementById("loginForm").classList.remove("hidden");
}

// INSCRIPTION
async function register(e) {
    e.preventDefault();

    let fullName = document.getElementById("regName").value.trim();
    let email = document.getElementById("regEmail").value.trim();
    let password = document.getElementById("regPassword").value.trim();

    if (!fullName || !email || !password) {
        alert("Remplir tous les champs !");
        return;
    }

    const parts = fullName.split(/\s+/).filter(Boolean);
    const nom = parts[0] || fullName;
    const prenom = parts.slice(1).join(" ") || "Student";

    try {
        const response = await fetch(`${API_BASE}/auth/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                nom,
                prenom,
                mail: email,
                password,
            }),
        });

        const payload = await response.json();
        if (!response.ok) {
            alert(payload.message || "Erreur inscription.");
            return;
        }

        alert("Inscription réussie !");
        showLogin();
    } catch (error) {
        alert("Impossible de contacter le serveur.");
    }
}

// LOGIN
async function login(e) {
    e.preventDefault();

    let email = document.getElementById("loginEmail").value.trim();
    let password = document.getElementById("loginPassword").value.trim();

    try {
        const response = await fetch(`${API_BASE}/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                mail: email,
                password,
            }),
        });

        const payload = await response.json();
        if (!response.ok) {
            alert(payload.message || "Email ou mot de passe incorrect !");
            return;
        }

        const data = payload.data || {};
        localStorage.setItem("user", `${data.nom || ""} ${data.prenom || ""}`.trim() || data.mail || "User");
        localStorage.setItem("userMail", data.mail || email);
        localStorage.setItem("userStatus", data.status || "student");
        window.location.href = "dashboard.html";
    } catch (error) {
        alert("Impossible de contacter le serveur.");
    }
}
</script>

</body>
</html>
