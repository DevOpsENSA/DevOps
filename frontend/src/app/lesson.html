<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lecture · ENSATE Préparation GI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <a href="dashboard.html" class="brand">ENSATE PRÉPARATION GI</a>
  <ul class="nav-links">
    <li><a href="dashboard.html">Accueil</a></li>
    <li><a href="lessons.html">Leçons</a></li>
    <!-- Désactivé pour le moment
    <li><a href="rank.html">Classement</a></li>
    <li><a href="profile.html">Profil</a></li>
    -->
  </ul>
  <div class="nav-user">
    <span id="roleBadge" class="role-badge">Étudiant</span>
    <div class="avatar" id="avatar">É</div>
    <button class="btn btn-ghost" onclick="logout()">Déconnexion</button>
  </div>
</nav>

<main class="container lesson-content">
  <a href="lessons.html" class="muted" style="display:inline-block; margin-bottom:16px">← Retour aux leçons</a>

  <div class="page-header">
    <h1 class="page-title" id="lessonTitle">Leçon</h1>
    <p class="page-subtitle">Bonne lecture, prenez le temps de bien comprendre.</p>
  </div>

  <div class="card" style="padding:28px">
    <div class="flex-row" style="justify-content:space-between">
      <div class="timer-pill">Temps de lecture · <span id="timer">0</span> sec</div>
      <a id="downloadLink" class="btn btn-ghost" target="_blank" rel="noopener" style="display:none">Ouvrir la leçon →</a>
    </div>

    <p id="lessonDescription" class="muted" style="margin-top:18px">
      Cliquez sur "Ouvrir la leçon" pour accéder au contenu partagé par votre enseignant.
    </p>

    <div class="lesson-actions">
      <!-- Désactivé pour le moment
      <button class="btn btn-primary" onclick="generateQuiz()">Générer un quiz</button>
      <button class="btn btn-ghost" onclick="generateResume()">Générer un résumé</button>
      -->
    </div>
  </div>
</main>

<div id="toastContainer" class="toast-container"></div>

<script src="app.js"></script>
<script>
const user = localStorage.getItem("user");
const status = localStorage.getItem("userStatus") || "student";
if (!user) window.location.href = "index.html";

document.getElementById("avatar").innerText = (user || "É").trim().charAt(0).toUpperCase();
const badge = document.getElementById("roleBadge");
badge.innerText = status === "admin" ? "Administrateur" : "Étudiant";
badge.classList.toggle("admin", status === "admin");

function logout() { localStorage.clear(); window.location.href = "index.html"; }

let time = 0;
const lesson = localStorage.getItem("currentLesson") || "Leçon";
const url = localStorage.getItem("currentLessonUrl") || "";
const description = localStorage.getItem("currentLessonDescription") || "";

document.getElementById("lessonTitle").innerText = lesson;
if (description) document.getElementById("lessonDescription").innerText = description;
if (url) {
  const link = document.getElementById("downloadLink");
  link.href = url;
  link.style.display = "inline-flex";
}

setInterval(() => {
  time++;
  document.getElementById("timer").innerText = time;
}, 1000);

window.onbeforeunload = function () {
  const history = JSON.parse(localStorage.getItem("history")) || [];
  history.push({ lesson, time, date: new Date().toLocaleString("fr-FR") });
  localStorage.setItem("history", JSON.stringify(history));
};

// Désactivé pour le moment
// function generateQuiz()   { toastInfo("Quiz généré."); }
// function generateResume() { toastInfo("Résumé généré."); }
</script>

</body>
</html>
