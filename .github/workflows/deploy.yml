name: CI/CD Pipeline

on:
  push:
    branches: [master,SCRUM-6-Backend-test]

jobs:
  # ══════════════════════════════
  # JOB 1 : TESTS (CI)
  # ══════════════════════════════
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_pgsql

      - name: Install dependencies
        run: |
          cd backend
          composer install

      - name: Copy .env
        run: |
          cd backend
          cp .env.example .env
          php artisan key:generate

      - name: Run tests
        run: |
          cd backend
          php artisan test --testdox

  # ══════════════════════════════
  # JOB 2 : BUILD (après tests)
  # ══════════════════════════════
  build:
    runs-on: ubuntu-latest
    needs: test    # ← attend que les tests passent !
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build et Push Backend
        run: |
          docker build -t ilyass324/backend:latest ./backend
          docker push ilyass324/backend:latest

      - name: Build et Push Frontend
        run: |
          docker build -t ilyass324/frontend:latest ./frontend
          docker push ilyass324/frontend:latest

  # ══════════════════════════════
  # JOB 3 : TERRAFORM (après build)
  # ══════════════════════════════
  terraform:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="db_password=admin123"
        working-directory: terraform