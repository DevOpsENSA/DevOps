<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bienvenue · Plateforme Étudiant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-logo"><i class="fa-solid fa-graduation-cap"></i></div>

    <div id="loginForm">
      <h2>Bon retour parmi nous</h2>
      <p class="subtitle">Connectez-vous pour continuer vos cours</p>

      <form onsubmit="login(event)">
        <div class="form-group">
          <label class="form-label">Email</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-envelope"></i>
            <input class="form-control" type="email" id="loginEmail" placeholder="vous@exemple.com" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Mot de passe</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock"></i>
            <input class="form-control" type="password" id="loginPassword" placeholder="••••••••" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">
          <i class="fa-solid fa-arrow-right-to-bracket"></i> Se connecter
        </button>
      </form>

      <p class="auth-toggle">Pas encore de compte ? <a onclick="showRegister()">Créer un compte</a></p>
    </div>

    <div id="registerForm" class="hidden">
      <h2>Créer votre compte</h2>
      <p class="subtitle">Rejoignez la plateforme en quelques secondes</p>

      <form onsubmit="register(event)">
        <div class="form-group">
          <label class="form-label">Nom complet</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-user"></i>
            <input class="form-control" type="text" id="regName" placeholder="Nom Prénom" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-envelope"></i>
            <input class="form-control" type="email" id="regEmail" placeholder="vous@exemple.com" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Mot de passe</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock"></i>
            <input class="form-control" type="password" id="regPassword" placeholder="6 caractères minimum" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">
          <i class="fa-solid fa-user-plus"></i> S'inscrire
        </button>
      </form>

      <p class="auth-toggle">Déjà inscrit ? <a onclick="showLogin()">Se connecter</a></p>
    </div>
  </div>
</div>

<script>
const API_BASE = `${window.location.protocol}//${window.location.hostname}:8080/api`;

function showRegister() {
  document.getElementById("loginForm").classList.add("hidden");
  document.getElementById("registerForm").classList.remove("hidden");
}

function showLogin() {
  document.getElementById("registerForm").classList.add("hidden");
  document.getElementById("loginForm").classList.remove("hidden");
}

async function register(e) {
  e.preventDefault();
  const fullName = document.getElementById("regName").value.trim();
  const email = document.getElementById("regEmail").value.trim();
  const password = document.getElementById("regPassword").value.trim();

  if (!fullName || !email || !password) {
    alert("Remplir tous les champs !");
    return;
  }

  const parts = fullName.split(/\s+/).filter(Boolean);
  const nom = parts[0] || fullName;
  const prenom = parts.slice(1).join(" ") || "Student";

  try {
    const response = await fetch(`${API_BASE}/auth/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ nom, prenom, mail: email, password }),
    });
    const payload = await response.json();
    if (!response.ok) {
      alert(payload.message || "Erreur inscription.");
      return;
    }
    alert("Inscription réussie !");
    showLogin();
  } catch (error) {
    alert("Impossible de contacter le serveur.");
  }
}

async function login(e) {
  e.preventDefault();
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value.trim();

  try {
    const response = await fetch(`${API_BASE}/auth/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ mail: email, password }),
    });
    const payload = await response.json();
    if (!response.ok) {
      alert(payload.message || "Email ou mot de passe incorrect !");
      return;
    }
    const data = payload.data || {};
    localStorage.setItem("user", `${data.nom || ""} ${data.prenom || ""}`.trim() || data.mail || "User");
    localStorage.setItem("userMail", data.mail || email);
    localStorage.setItem("userStatus", data.status || "student");
    window.location.href = "dashboard.html";
  } catch (error) {
    alert("Impossible de contacter le serveur.");
  }
}
</script>

</body>
</html>
