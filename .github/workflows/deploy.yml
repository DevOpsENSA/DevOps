
name: CI/CD Pipeline
on:
  push:
    branches: [master]
 
jobs:
  # ══════════════════════════════
  # JOB 1 : TESTS
  # ══════════════════════════════
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: plateformEtudiant_test
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
 
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_pgsql
 
      - name: Install dependencies
        run: cd backend && composer install
 
      - name: Copy .env
        run: |
          cd backend
          cp .env.example .env
          php artisan key:generate
 
      - name: Run migrations
        run: cd backend && php artisan migrate --force
 
      - name: Run tests
        run: cd backend && php artisan test --testdox
 
  # ══════════════════════════════
  # JOB 2 : BUILD DOCKER
  # ══════════════════════════════
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
 
      - name: Login DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
 
      - name: Build et Push Backend
        run: |
          docker build -t omarelhorre/backendenddevops:latest ./backend
          docker push omarelhorre/backendenddevops:latest
 
      - name: Build et Push Frontend
        run: |
          docker build -t omarelhorre/frontenddevops:latest ./frontend
          docker push omarelhorre/frontenddevops:latest
 
  # ══════════════════════════════
  # JOB 3 : DEPLOY SUR EC2
  # ══════════════════════════════


  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: SSH into EC2 and redeploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/app
            docker-compose pull
            docker-compose up -d
            docker-compose exec -T backend php artisan migrate --force; exit 0

  zap:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: ZAP Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'http://${{ secrets.EC2_HOST }}:8080'
